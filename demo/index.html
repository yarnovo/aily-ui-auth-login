<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>aily-ui AuthLogin · demo</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yarnovo/aily-ui-tokens@main/src/tokens.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yarnovo/aily-ui-tokens@main/src/tokens.dark.css" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/yarnovo/aily-ui-button@main/src/Button.css" />
<link rel="stylesheet" href="../src/LoginFlow.css" />
<style>
  body {
    font-family: var(--ak-font-sans);
    background: var(--ak-bg);
    color: var(--ak-fg);
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  .demo-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: var(--ak-space-6);
  }
  .demo-wrap h2 {
    font-size: var(--ak-text-md);
    font-weight: var(--ak-weight-semibold);
    margin: var(--ak-space-8) 0 var(--ak-space-3);
    text-align: center;
  }
  .demo-frame {
    background: var(--ak-bg-subtle);
    border-radius: var(--ak-radius-md);
    padding: var(--ak-space-3);
    margin-bottom: var(--ak-space-6);
  }
  .demo-frame .ak-login-flow {
    min-height: auto;
    padding: var(--ak-space-8) var(--ak-space-6);
    border-radius: var(--ak-radius-md);
  }
  .toggle {
    position: fixed;
    top: 64px;
    right: 16px;
    padding: 8px 12px;
    border-radius: var(--ak-radius-full);
    background: var(--ak-fg);
    color: var(--ak-bg);
    border: 0;
    font-size: var(--ak-text-sm);
    cursor: pointer;
    z-index: 100;
  }
  .back-to-index {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    padding: 8px 16px;
    background: var(--ak-bg-elevated);
    border: 1px solid var(--ak-border-subtle);
    border-radius: var(--ak-radius-full);
    color: var(--ak-fg-muted);
    text-decoration: none;
    font-size: var(--ak-text-sm);
    box-shadow: var(--ak-shadow-sm);
    transition: all 0.2s;
  }
  .back-to-index:hover {
    background: var(--ak-bg-hover);
    color: var(--ak-fg);
  }
</style>
</head>
<body>
  <a href="https://yarnovo.github.io/aily-ui-core/" class="back-to-index">← 回 aily-ui 总站</a>
  <button class="toggle" id="t">切换暗色</button>
  <div class="demo-wrap">
    <h2>Step 1 · 手机号</h2>
    <div class="demo-frame">
      <div class="ak-login-flow" data-testid="login-page">
        <div class="ak-login-flow__header">
          <h1 class="ak-login-flow__title" data-testid="login-logo">小喜</h1>
          <p class="ak-login-flow__subtitle" data-testid="login-subtitle">找你的人</p>
        </div>
        <div class="ak-login-flow__panel" data-testid="login-step-phone">
          <input
            type="tel"
            inputMode="numeric"
            maxLength="11"
            placeholder="手机号"
            value="13800138000"
            class="ak-login-flow__input"
            data-testid="login-phone-input"
          />
          <div data-testid="login-send-code-btn-wrap">
            <button class="ak-btn ak-btn--primary ak-btn--md ak-btn--full-width">
              <span>发验证码</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <h2>Step 2 · 验证码</h2>
    <div class="demo-frame">
      <div class="ak-login-flow" data-testid="login-page">
        <div class="ak-login-flow__header">
          <h1 class="ak-login-flow__title">小喜</h1>
          <p class="ak-login-flow__subtitle">找你的人</p>
        </div>
        <div class="ak-login-flow__panel" data-testid="login-step-code">
          <div class="ak-login-flow__phone-display" data-testid="login-phone-display">
            验证码已发送至 13800138000
          </div>
          <input
            type="tel"
            inputMode="numeric"
            maxLength="6"
            placeholder="6 位验证码"
            value="123456"
            class="ak-login-flow__input"
            data-testid="login-code-input"
          />
          <div data-testid="login-verify-btn-wrap">
            <button class="ak-btn ak-btn--primary ak-btn--md ak-btn--full-width">
              <span>登录</span>
            </button>
          </div>
          <div class="ak-login-flow__row">
            <button
              type="button"
              class="ak-login-flow__link"
              data-testid="login-change-phone-btn"
            >换个手机号</button>
            <button
              type="button"
              class="ak-login-flow__link"
              data-testid="login-resend-btn"
            >重发 (60s)</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  document.getElementById('t').onclick = () => {
    document.documentElement.classList.toggle('dark')
  }
</script>
</body>
</html>
